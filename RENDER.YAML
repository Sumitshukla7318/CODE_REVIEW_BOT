services:
  - type: web
    name: code-review-bot
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: code-review-bot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: code-review-bot-redis
          type: redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: WEBHOOK_SECRET_ENCRYPTION_KEY
        sync: false

  - type: worker
    name: code-review-bot-celery
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config worker --loglevel=info"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: code-review-bot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: code-review-bot-redis
          type: redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: WEBHOOK_SECRET_ENCRYPTION_KEY
        sync: false
      - key: SECRET_KEY
        sync: false

  - type: worker
    name: code-review-bot-celery-beat
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config beat --loglevel=info"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: code-review-bot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: code-review-bot-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        sync: false

databases:
  - name: code-review-bot-db
    databaseName: code_review_bot
    user: postgres

  - name: code-review-bot-redis
    type: redis